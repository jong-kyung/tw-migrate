name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        runner:
          - macos-14
          - macos-15-intel
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - run: pnpm artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.runner }}
          path: 'npm/**/*.node'

  packaged-cli-snapshots:
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.runner }}
    env:
      CI: true
      INSTA_UPDATE: no
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm snapshots:prepare
      - name: Install snapshot review CLI
        if: runner.os == 'Linux'
        run: cargo install cargo-insta --version 1.48.0 --locked
      - name: Run snapshots and reject pending or unreferenced files
        if: runner.os == 'Linux'
        run: cargo insta test --check --unreferenced reject -p tw-migrate-snapshots
      - name: Run snapshots
        if: runner.os != 'Linux'
        run: cargo test -p tw-migrate-snapshots
