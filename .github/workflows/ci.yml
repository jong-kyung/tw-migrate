name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        runner:
          - macos-14
          - macos-15-intel
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.runner }}
          path: 'npm/**/*.node'
