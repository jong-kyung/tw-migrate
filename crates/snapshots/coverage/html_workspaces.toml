# Characterization source: test/migrate.test.js

[[cases]]
source = "updates linked static HTML literals while preserving bytes and scope"
disposition = "e2e"
target = "html_static_literals"

[[cases]]
source = "removes a fully migrated CSS Module and its static HTML link"
disposition = "e2e"
target = "html_static_module_link"

[[cases]]
source = "fully migrates a CSS Module consumed only by static HTML"
disposition = "e2e"
target = "html_static_module_link"

[[cases]]
source = "removes a generated CSS link after inferred preprocessor module migration"
disposition = "e2e"
target = "inferred_preprocessor_source"

[[cases]]
source = "retains an HTML-linked CSS Module when an attribute is dynamic"
disposition = "e2e"
target = "html_dynamic_attribute"

[[cases]]
source = "retains a CSS Module named by an inline script"
disposition = "e2e"
target = "html_inline_script_reference"

[[cases]]
source = "ignores inline scripts that do not name module classes"
disposition = "e2e"
target = "html_irrelevant_inline_script"

[[cases]]
source = "removes an entity-bearing HTML link with its migrated CSS Module"
disposition = "e2e"
target = "html_static_module_link"

[[cases]]
source = "retains a CSS Module when one HTML link has unsupported media"
disposition = "e2e"
target = "html_unsupported_links"

[[cases]]
source = "adds a class attribute for an id-only HTML match"
disposition = "e2e"
target = "html_static_literals"

[[cases]]
source = "uses UTF-8 byte offsets for non-ASCII HTML class edits and id-only insertion"
